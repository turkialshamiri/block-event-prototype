<aside class="summary-panel" dir="rtl" aria-label="ملخص الـ Block">
  <article class="summary-card">
    <header class="summary-card__header">
      <h2 class="summary-card__title">ملخص الـ Block</h2>
      <hr class="summary-card__divider" />
    </header>

    <ul class="summary-card__list">
      @for (item of items; track item.label) {
        <li class="summary-item">
          <div class="summary-item__icon" aria-hidden="true">
            <i [class]="item.icon"></i>
          </div>
          <div class="summary-item__content">
            <span class="summary-item__label">{{ item.label }}</span>
            @if (item.badge) {
              <span
                class="summary-item__badge"
                [class.summary-item__badge--green]="item.badge === 'green'"
                [class.summary-item__badge--gray]="item.badge === 'gray'"
              >
                {{ item.value }}
              </span>
            } @else {
              <span class="summary-item__value">{{ item.value }}</span>
            }
          </div>
        </li>
      }
    </ul>

    <div class="summary-card__hotel-art" aria-hidden="true"></div>
  </article>
</aside>
